<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient nawiązujący do kolorów Twojej aplikacji (Indigo -> Pink) -->
    <linearGradient id="appGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Zaokrąglone tło z gradientem -->
  <rect width="100" height="100" rx="24" fill="url(#appGradient)" />
  
  <!-- Nowoczesny, dynamiczny symbol "E" / Fiszka -->
  <g filter="url(#shadow)" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Kontur fiszki -->
    <rect x="25" y="25" width="50" height="50" rx="8" />
    <!-- Linie tekstu / litera E -->
    <path d="M 40 40 L 60 40" />
    <path d="M 40 50 L 55 50" />
    <path d="M 40 60 L 60 60" />
    <!-- Dynamiczna błyskawica / akcent w rogu -->
    <path d="M 75 15 L 85 25" stroke="#fde047" stroke-width="6" />
  </g>
</svg>
